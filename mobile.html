<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Mobile-Friendly Screenshot Block Detector</title>
<style>
  /* Controls container: take half screen width */
  .controls {
    font-size: 18px;
    margin-bottom: 10px;
    width: 48%;             /* half screen */
    display: inline-block;   /* sit next to image */
    vertical-align: top;
  }

  /* Sliders: big track and thumb for mobile */
  input[type="range"] {
    -webkit-appearance: none; /* remove default small styling in Safari */
    width: 100%;
    height: 40px;             /* tall track for touch */
    margin-bottom: 15px;
    background: #ddd;
    border-radius: 10px;
    touch-action: none;
  }

  input[type="range"]::-webkit-slider-runnable-track {
    height: 12px;
    background: #888;
    border-radius: 6px;
  }

  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 30px;
    height: 30px;
    background: limegreen;
    border-radius: 50%;
    margin-top: -9px; /* center thumb on track */
    cursor: pointer;
  }

  input[type="range"]::-moz-range-track {
    height: 12px;
    background: #888;
    border-radius: 6px;
  }

  input[type="range"]::-moz-range-thumb {
    width: 30px;
    height: 30px;
    background: limegreen;
    border-radius: 50%;
    cursor: pointer;
  }

  /* File input & buttons: larger for mobile */
  input[type="file"], button {
    font-size: 18px;
    padding: 12px 20px;
    border-radius: 8px;
    cursor: pointer;
    margin-bottom: 15px;
    display: block;
    width: 100%;
    box-sizing: border-box;
  }

  /* Image + overlay container floats on the right freely */
  #container {
    position: relative;
    /* display: inline-block;    natural image size */
    float: right;             /* move container to right */
    max-width: 48%;           /* optional max width for very large screens */
  }

  #image {
    display: block;           /* keep full resolution */
    width: 100%;              /* scale visually to container */
    height: auto;
  }

  #overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    cursor: pointer;
    pointer-events: auto;
  }

  /* Debug info */
  #debug {
    font-size: 14px;
    background: #111;
    color: #0f0;
    padding: 10px;
    max-height: 200px;
    overflow-y: auto;
    margin-top: 10px;
  }

  /* Mobile stacking for small screens */
  @media (max-width: 600px) {
    .controls, #container {
      width: 100%;
      float: none;
      display: block;
      margin-top: 10px;
    }

    input[type="range"], input[type="file"], button {
      height: 45px; /* slightly bigger for touch */
      font-size: 20px;
    }
  }
</style>
</head>
<body>

<h2>Mobile-Friendly Screenshot Block Detector</h2>

<div class="controls">
  <input type="file" id="upload" accept="image/*">
  <div id="sliders"></div>
</div>

<div id="container">
  <img id="image">
  <canvas id="overlay"></canvas>
</div>

<pre id="debug"></pre>

<script>
const image = document.getElementById("image");
const overlay = document.getElementById("overlay");
const ctx = overlay.getContext("2d");
const upload = document.getElementById("upload");
const debug = document.getElementById("debug");
const slidersDiv = document.getElementById("sliders");

let tempCanvas = document.createElement("canvas");
let tempCtx = tempCanvas.getContext("2d");
let sliders = {};
let currentBlocks = [];

// ---------- SLIDERS ----------
function createSlider(label, min, max, value, step, key) {
  const wrapper = document.createElement("div");
  const text = document.createElement("label");
  text.innerText = label + ": " + value;
  const slider = document.createElement("input");
  slider.type = "range"; slider.min = min; slider.max = max; slider.value = value; slider.step = step;
  slider.oninput = () => { text.innerText = label + ": " + slider.value; runDetection(); };
  wrapper.appendChild(text); wrapper.appendChild(slider);
  slidersDiv.appendChild(wrapper);
  sliders[key] = slider;
}

// Defaults
createSlider("Gap Threshold", 2, 50, 50, 1, "gap");
createSlider("Diff Threshold", 5, 100, 16, 1, "diff");
createSlider("Column Padding", 0, 20, 3, 1, "padding");
createSlider("Vertical Padding", 0, 100, 44, 1, "vPadding"); 
createSlider("Tolerance %", 0, 200, 20, 1, "tolerance"); 

// ---------- IMAGE UPLOAD ----------
upload.addEventListener("change", e => {
  const reader = new FileReader();
  reader.onload = ev => image.src = ev.target.result;
  reader.readAsDataURL(e.target.files[0]);
});

image.onload = () => {
  overlay.width = image.width;
  overlay.height = image.height;
  tempCanvas.width = image.width;
  tempCanvas.height = image.height;
  runDetection();
};

// ---------- DETECTION ----------
function runDetection() {
  if (!image.src) return;

  tempCtx.drawImage(image, 0, 0);
  const width = tempCanvas.width;
  const height = tempCanvas.height;
  const data = tempCtx.getImageData(0,0,width,height).data;

  const GAP = parseInt(sliders.gap.value);
  const DIFF_THRESHOLD = parseInt(sliders.diff.value);
  const PADDING = parseInt(sliders.padding.value);
  const V_PADDING = parseInt(sliders.vPadding.value);
  const TOLERANCE = parseInt(sliders.tolerance.value)/100;

  ctx.clearRect(0,0,overlay.width,overlay.height);

  // Dynamic background
  let bgR=0,bgG=0,bgB=0,bgCount=0;
  for(let y=0;y<height;y+=5){
    for(let x=0;x<width;x+=5){
      const i = (y*width+x)*4;
      const r = data[i], g = data[i+1], b = data[i+2];
      const lum = 0.299*r + 0.587*g + 0.114*b;
      if(lum<100){ bgR+=r; bgG+=g; bgB+=b; bgCount++; }
    }
  }
  if(bgCount===0) bgCount=1;
  bgR/=bgCount; bgG/=bgCount; bgB/=bgCount;
  const background=[bgR,bgG,bgB];

  // Vertical detection
  const rowDiff = new Array(height).fill(0);
  for(let y=0;y<height;y++){
    let sum=0;
    for(let x=0;x<width;x++){
      const i=(y*width+x)*4;
      sum += Math.abs(data[i]-background[0])
           + Math.abs(data[i+1]-background[1])
           + Math.abs(data[i+2]-background[2]);
    }
    rowDiff[y] = sum/width;
  }

  for(let y=1;y<height-1;y++){
    rowDiff[y] = (rowDiff[y-1]+rowDiff[y]+rowDiff[y+1])/3;
  }

  const regions=[];
  let inBlock=false,startY=0,CONSEC=3;
  for(let y=0;y<height;y++){
    const above=rowDiff[y]>DIFF_THRESHOLD?1:0;
    if(above){
      if(!inBlock){
        let count=0;
        for(let k=y;k<y+CONSEC && k<height;k++) if(rowDiff[k]>DIFF_THRESHOLD) count++;
        if(count===CONSEC){inBlock=true; startY=y;}
      }
    }else{
      if(inBlock){if(y-startY>GAP) regions.push({y:startY,height:y-startY}); inBlock=false;}
    }
  }
  if(inBlock && height-startY>GAP) regions.push({y:startY,height:height-startY});

  // Horizontal crop
  function cropRegion(region){
    let left = 0, right = width - 1;

    // LEFT EDGE
    for(let col=0; col<width; col++){
        let badRows = 0;
        for(let y=region.y; y<region.y+region.height; y++){
            const i = (y*width+col)*4;
            const diff = Math.abs(data[i]-background[0])
                       + Math.abs(data[i+1]-background[1])
                       + Math.abs(data[i+2]-background[2]);
            if(diff > DIFF_THRESHOLD) badRows++;
        }
        if(badRows/region.height > TOLERANCE){
            left = col;
            break;
        }
    }

    // RIGHT EDGE
    for(let col=width-1; col>=0; col--){
        let badRows = 0;
        for(let y=region.y; y<region.y+region.height; y++){
            const i = (y*width+col)*4;
            const diff = Math.abs(data[i]-background[0])
                       + Math.abs(data[i+1]-background[1])
                       + Math.abs(data[i+2]-background[2]);
            if(diff > DIFF_THRESHOLD) badRows++;
        }
        if(badRows/region.height > TOLERANCE){
            right = col;
            break;
        }
    }

    // Apply horizontal padding
    left = Math.max(0, left - PADDING);
    right = Math.min(width-1, right + PADDING);

    // Vertical padding only affects top
    const top = Math.max(region.y + V_PADDING, 0);
    const bottom = region.y + region.height;

    return {x:left, y:top, width:right-left, height:bottom-top};
}

  currentBlocks = regions.map(r=>cropRegion(r));

  // Draw blocks
  ctx.clearRect(0,0,overlay.width,overlay.height);
  ctx.strokeStyle="lime"; ctx.lineWidth=2; ctx.font="16px Arial"; ctx.fillStyle="lime";
  currentBlocks.forEach((r,i)=>{
    ctx.strokeRect(r.x,r.y,r.width,r.height);
    ctx.fillText(`Block ${i}`, r.x+5,r.y+20);
  });

  debug.textContent = `Blocks: ${currentBlocks.length}\nBackground RGB: ${background.map(v=>Math.round(v))}\nGap: ${GAP}\nDiff Threshold: ${DIFF_THRESHOLD}\nPadding: ${PADDING}\nVertical Padding: ${V_PADDING}\nTolerance %: ${TOLERANCE*100}`;
}

// Click to download
overlay.addEventListener("click", function(e){
  if(!currentBlocks.length) return;
  const rect = overlay.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;

  for(let i=0;i<currentBlocks.length;i++){
    const r = currentBlocks[i];
    if(x>=r.x && x<=r.x+r.width && y>=r.y && y<=r.y+r.height){
      downloadBlock(r,i);
      break;
    }
  }
});

function downloadBlock(block, index){
  const tmpCanvas = document.createElement("canvas");
  const tmpCtx = tmpCanvas.getContext("2d");
  tmpCanvas.width = block.width;
  tmpCanvas.height = block.height;

  tmpCtx.drawImage(
    image,
    block.x, block.y, block.width, block.height,
    0, 0, block.width, block.height
  );

  const link = document.createElement("a");
  link.download = `block_${index}.png`;
  link.href = tmpCanvas.toDataURL();
  link.click();
}
</script>
